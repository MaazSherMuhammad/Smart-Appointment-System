# ==========================================
#  Smart Appointment Management System
#  application.properties
# ==========================================
server.port=8080

# ==========================================
# ⚠️  DATABASE CONFIGURATION
# ==========================================
# The error "Access denied for user 'root' (using password: YES)" means your MySQL
# root password does NOT match what is set below.
#
# FIX: Set your MySQL root password on the line below.
# Examples:
#   spring.datasource.password=           ← no password (most common for XAMPP/local install)
#   spring.datasource.password=root       ← if your password is "root"
#   spring.datasource.password=1234       ← if your password is "1234"
#   spring.datasource.password=mubashar   ← your actual password
#
# To find your MySQL password, open MySQL Workbench → try connecting with different passwords
# OR open cmd/PowerShell → type: mysql -u root -p → enter password when prompted
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_appointment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=812921mysql

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ── JPA / Hibernate ───────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
# Fix "LocalDate serialized as [2024,1,1]" bug → sends "2024-01-01" string
spring.jackson.serialization.write-dates-as-timestamps=false

# ── JWT ───────────────────────────────────
app.jwt.secret=SmartAppointmentSystem_SuperSecretKey_2024_Min32CharsLong_ForSecurity!
app.jwt.expiration-ms=86400000

# ── CORS (allow Live Server + direct open) ─
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# ── Logging ───────────────────────────────
logging.level.com.project.appointment=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
# Suppress deprecated dialect warning
logging.level.org.hibernate.orm.deprecation=ERROR
