<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Booking - AppointEase</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
</head>
<body>
    <div class="dashboard-wrapper theme-healthcare">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="fas fa-calendar-check"></i></div>
                <div><strong>AppointEase</strong><br><small style="color: var(--gray-500);">Healthcare Portal</small></div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">Menu</div>
                <a href="../dashboard/appointer.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="book.html"><i class="fas fa-calendar-plus"></i> Book Appointment</a>
                <a href="history.html"><i class="fas fa-history"></i> Appointment History</a>
                
                <div class="nav-section">Categories</div>
                <a href="healthcare.html" class="active"><i class="fas fa-hospital-user"></i> Healthcare</a>
                <a href="business.html"><i class="fas fa-briefcase"></i> Business</a>
                <a href="educational.html"><i class="fas fa-graduation-cap"></i> Educational</a>
                <a href="personal.html"><i class="fas fa-spa"></i> Personal Services</a>
                <a href="government.html"><i class="fas fa-landmark"></i> Government</a>
                <a href="technical.html"><i class="fas fa-tools"></i> Technical/Repair</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" onclick="Auth.logout()">
                    <div class="user-avatar user-initials">JD</div>
                    <div>
                        <div class="user-name">John Doe</div>
                        <div class="user-role" style="font-size: 0.7rem;">Appointer</div>
                    </div>
                    <i class="fas fa-sign-out-alt" style="margin-left: auto;"></i>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar category-header">
                <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div class="page-title">
                    <h1>Book Healthcare</h1>
                    <p>Schedule your medical appointments instantly</p>
                </div>
            </div>

            <div class="content-area">
                <div class="card">
                    <div class="card-header">
                        <span class="card-title"><i class="fas fa-hospital-user"></i> Medical Details</span>
                    </div>
                    <div class="card-body">
                        <form id="bookingForm">
                            <input type="hidden" id="category" value="Healthcare">
                            
                            <!-- Step 1: Select Service -->
                            <div class="form-group">
                                <label class="form-label">1. Select Medical Service</label>
                                <select id="service" class="form-control" required onchange="updateProviders()">
                                    <option value="">-- Select Service --</option>
                                    <option value="Doctor Consultation">Doctor Consultation</option>
                                    <option value="Dentist Appointment">Dentist Appointment</option>
                                    <option value="Physiotherapy">Physiotherapy</option>
                                    <option value="Mental Health Session">Mental Health Session</option>
                                    <option value="Lab Tests">Lab Tests</option>
                                    <option value="Eye Checkup">Eye Checkup</option>
                                </select>
                            </div>

                            <!-- Step 2: Select Provider -->
                            <div class="form-group">
                                <label class="form-label">2. Select Doctor</label>
                                <select id="provider" class="form-control" required>
                                    <option value="">-- Select Doctor --</option>
                                    <option value="Dr. Ahmed - General Physician">Dr. Ahmed - General Physician</option>
                                    <option value="Dr. Sarah - Cardiologist">Dr. Sarah - Cardiologist</option>
                                    <option value="Dr. Ali - Dentist">Dr. Ali - Dentist</option>
                                    <option value="Dr. Fatima - Physiotherapist">Dr. Fatima - Physiotherapist</option>
                                    <option value="Dr. Omar - Psychiatrist">Dr. Omar - Psychiatrist</option>
                                </select>
                            </div>

                            <!-- Step 3: Select Date & Time -->
                            <div class="form-group">
                                <label class="form-label">3. Select Appointment Date</label>
                                <input type="date" id="date" class="form-control" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">4. Select Time Slot</label>
                                <select id="timeSlot" class="form-control" required>
                                    <option value="">-- Select Time Slot --</option>
                                    <option value="09:00 AM">09:00 AM</option>
                                    <option value="10:00 AM">10:00 AM</option>
                                    <option value="11:00 AM">11:00 AM</option>
                                    <option value="12:00 PM">12:00 PM</option>
                                    <option value="01:00 PM">01:00 PM</option>
                                    <option value="02:00 PM">02:00 PM</option>
                                    <option value="03:00 PM">03:00 PM</option>
                                    <option value="04:00 PM">04:00 PM</option>
                                    <option value="05:00 PM">05:00 PM</option>
                                </select>
                            </div>

                            <!-- Additional Notes -->
                            <div class="form-group">
                                <label class="form-label">Additional Medical Notes</label>
                                <textarea id="notes" class="form-control" rows="3" placeholder="Describe any symptoms or history..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-category btn-full" style="margin-top: 20px;">
                                <i class="fas fa-check-circle"></i> Confirm Healthcare Booking
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/validation.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/appointment.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.requireAuth()) return;
            const user = Auth.getCurrentUser();
            if (user) {
                document.querySelectorAll('.user-name').forEach(el => el.textContent = user.fullName);
                document.querySelectorAll('.user-initials').forEach(el => {
                    el.textContent = user.fullName.split(' ').map(n => n[0]).join('').toUpperCase();
                });
            }
            const today = new Date().toISOString().split('T')[0];
            
            // Initialize Flatpickr
            flatpickr("#date", {
                minDate: "today",
                dateFormat: "Y-m-d",
                position: "below",
                disableMobile: "true",
                onReady: function(selectedDates, dateStr, instance) {
                    const footer = document.createElement('div');
                    footer.className = 'flatpickr-footer-actions';
                    footer.innerHTML = `
                        <button type="button" class="fp-btn fp-btn-clear">Clear</button>
                        <button type="button" class="fp-btn fp-btn-today">Today</button>
                    `;
                    instance.calendarContainer.appendChild(footer);
                    
                    footer.querySelector('.fp-btn-clear').addEventListener('click', () => {
                        instance.clear();
                        instance.close();
                    });
                    
                    footer.querySelector('.fp-btn-today').addEventListener('click', () => {
                        instance.setDate(new Date());
                        instance.close();
                    });
                }
            });
        });

        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const service = document.getElementById('service').value;
            const provider = document.getElementById('provider').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('timeSlot').value;
            
            if (!service || !provider || !date || !time) {
                showToast('Fields required', 'error');
                return;
            }
            const appointment = {
                category: 'Healthcare',
                service: service,
                provider: provider,
                date: date,
                time: time,
                notes: document.getElementById('notes').value,
                status: 'confirmed'
            };
            if (AppointmentManager.book(appointment)) {
                setTimeout(() => { window.location.href = 'history.html'; }, 1500);
            }
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    </script>
</body>
</html>
