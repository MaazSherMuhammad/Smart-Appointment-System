<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancel Appointment - AppointEase</title>

</head>
<body>
    <div id="toastContainer" class="toast-container"></div>
    <p style="text-align:center; margin-top:40px; font-family:sans-serif; color:#6B7280;">
        Processing cancellation...
    </p>

    <script src="../js/app.bundle.js"></script>
    <script>
        (async function() {
            if (!Auth.requireAuth()) return;

            const urlParams = new URLSearchParams(window.location.search);
            const appointmentId = parseInt(urlParams.get('id'));
            const reason = urlParams.get('reason') || 'Cancelled by user';

            if (!appointmentId) {
                window.location.href = 'history.html';
                return;
            }

            if (confirm('Are you sure you want to cancel this appointment?')) {
                const ok = await AppointmentManager.cancelAppointment(appointmentId, reason);
                if (ok) {
                    setTimeout(() => { window.location.href = 'history.html'; }, 1200);
                } else {
                    setTimeout(() => { window.location.href = 'history.html'; }, 2000);
                }
            } else {
                window.location.href = 'history.html';
            }
        })();
    </script>
</body>
</html>
