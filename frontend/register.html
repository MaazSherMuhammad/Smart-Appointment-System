<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AppointEase</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="icon-wrapper">
                    <i class="fas fa-user-plus icon"></i>
                </div>
                <h2>Create Account 🚀</h2>
                <p>Join AppointEase for smart appointment scheduling</p>
            </div>
            
            <form id="registerForm">
                <!-- Full Name -->
                <div class="form-group input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                </div>
                
                <!-- Email -->
                <div class="form-group input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                </div>
                
                <!-- Phone -->
                <div class="form-group input-icon">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="phone" class="form-control" placeholder="+92 300 1234567">
                </div>
                
                <!-- Password -->
                <div class="form-group input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="Create a strong password (min 8 chars)" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                
                <!-- Confirm Password -->
                <div class="form-group input-icon">
                    <i class="fas fa-shield-alt"></i>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                
                <!-- Role Selection with Cards -->
                <div class="form-group">
                    <label class="form-label">I want to register as</label>
                    <div class="role-grid">
                        <div class="role-card selected" onclick="selectRole(this, 'patient')">
                            <span class="role-icon">👤</span>
                            <div class="role-name">Patient</div>
                            <div class="role-desc">Book appointments</div>
                        </div>
                        <div class="role-card" onclick="selectRole(this, 'doctor')">
                            <span class="role-icon">🩺</span>
                            <div class="role-name">Doctor/Provider</div>
                            <div class="role-desc">Manage services</div>
                        </div>
                    </div>
                    <input type="hidden" id="role" value="patient">
                </div>
                
                <!-- Terms Agreement -->
                <div style="margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.85rem;">
                        <input type="checkbox" id="termsCheckbox" style="accent-color: var(--primary); width: 18px; height: 18px;">
                        <span>I agree to the <a href="#" style="color: var(--primary);">Terms of Service</a> and <a href="#" style="color: var(--primary);">Privacy Policy</a></span>
                    </label>
                </div>
                
                <button type="submit" class="auth-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            
            <div class="auth-divider">or sign up with</div>
            
            <div class="social-login">
                <button class="social-btn google" onclick="showToast('Google signup coming soon', 'info')">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="social-btn github" onclick="showToast('GitHub signup coming soon', 'info')">
                    <i class="fab fa-github"></i> GitHub
                </button>
            </div>
            
            <div class="auth-link">
                Already have an account? <a href="login.html">Sign In →</a>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script>
        const Storage = {
            save(key, data) { localStorage.setItem(key, JSON.stringify(data)); },
            get(key) { const data = localStorage.getItem(key); return data ? JSON.parse(data) : null; }
        };

        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type || 'info'}`;
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle';
            toast.innerHTML = `<i class="fas fa-${icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const btn = field.nextElementSibling;
            if (field.type === 'password') {
                field.type = 'text';
                btn.innerHTML = '<i class="far fa-eye-slash"></i>';
            } else {
                field.type = 'password';
                btn.innerHTML = '<i class="far fa-eye"></i>';
            }
        }

        function selectRole(el, role) {
            document.querySelectorAll('.role-card').forEach(card => card.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('role').value = role;
        }

        function register(userData) {
            if (!userData.fullName) {
                showToast('Please enter your full name', 'error');
                return false;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(userData.email)) {
                showToast('Please enter a valid email address', 'error');
                return false;
            }
            
            if (userData.password.length < 8) {
                showToast('Password must be at least 8 characters', 'error');
                return false;
            }
            
            if (userData.password !== userData.confirmPassword) {
                showToast('Passwords do not match', 'error');
                return false;
            }
            
            const termsCheckbox = document.getElementById('termsCheckbox');
            if (!termsCheckbox.checked) {
                showToast('Please agree to the Terms of Service', 'error');
                return false;
            }
            
            let users = Storage.get('users') || [];
            if (users.find(u => u.email === userData.email)) {
                showToast('User already exists with this email', 'error');
                return false;
            }
            
            const newUser = {
                id: Date.now(),
                fullName: userData.fullName,
                email: userData.email,
                phone: userData.phone,
                role: userData.role,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            Storage.save('users', users);
            
            const credentials = Storage.get('credentials') || {};
            credentials[userData.email] = userData.password;
            Storage.save('credentials', credentials);
            
            showToast('Account created successfully! 🎉 Please login.', 'success');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
            
            return true;
        }

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const userData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value,
                role: document.getElementById('role').value
            };
            register(userData);
        });
    </script>
</body>
</html>
