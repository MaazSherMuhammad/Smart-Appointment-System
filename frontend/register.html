<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AppointEase</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .btn-loading { opacity: 0.75; pointer-events: none; cursor: not-allowed; }

        #backendStatusBanner {
            display: none;
            align-items: flex-start;
            gap: 12px;
            background: #fef2f2;
            border: 1.5px solid #fca5a5;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 18px;
            font-size: 0.83rem;
            color: #991b1b;
            line-height: 1.5;
        }
        #backendStatusBanner .banner-icon { font-size: 1.3rem; flex-shrink: 0; }
        #backendStatusBanner code {
            display: inline-block; background: #fee2e2;
            padding: 2px 7px; border-radius: 5px;
            font-family: monospace; font-size: 0.82em; color: #7f1d1d; margin: 2px 0;
        }
        #backendStatusBanner strong { display: block; margin-bottom: 4px; }

        #statusDot {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.75rem; color: #6B7280; margin-bottom: 10px;
        }
        #statusDot .dot { width:8px; height:8px; border-radius:50%; background:#D1D5DB; display:inline-block; }
        #statusDot.online .dot  { background: #10B981; }
        #statusDot.offline .dot { background: #EF4444; }
        #statusDot.checking .dot { background: #F59E0B; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        <div class="auth-card">
            <div class="auth-header">
                <div class="icon-wrapper">
                    <i class="fas fa-user-plus icon"></i>
                </div>
                <h2>Create Account 🚀</h2>
                <p>Join AppointEase for smart appointment scheduling</p>
            </div>

            <div id="statusDot" class="checking">
                <span class="dot"></span>
                <span id="statusText">Checking backend...</span>
            </div>

            <div id="backendStatusBanner">
                <span class="banner-icon">🔴</span>
                <div>
                    <strong>Backend server is not running</strong>
                    Open a terminal and run:<br>
                    <code>cd backend</code><br>
                    <code>mvn spring-boot:run</code><br>
                    Then refresh this page.
                </div>
            </div>

            <form id="registerForm">
                <div class="form-group input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullName" class="form-control"
                           placeholder="Full Name" required autocomplete="name">
                </div>

                <div class="form-group input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" class="form-control"
                           placeholder="Email Address" required autocomplete="email">
                </div>

                <div class="form-group input-icon">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="phone" class="form-control"
                           placeholder="Phone Number (optional)" autocomplete="tel">
                </div>

                <div class="form-group input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-control"
                           placeholder="Password (min 8 characters)" required>
                    <button type="button" class="toggle-password" onclick="togglePwd('password','eye1')">
                        <i class="far fa-eye" id="eye1"></i>
                    </button>
                </div>

                <div class="form-group input-icon">
                    <i class="fas fa-shield-alt"></i>
                    <input type="password" id="confirmPassword" class="form-control"
                           placeholder="Confirm Password" required>
                    <button type="button" class="toggle-password" onclick="togglePwd('confirmPassword','eye2')">
                        <i class="far fa-eye" id="eye2"></i>
                    </button>
                </div>

                <div style="margin-bottom:20px;">
                    <label style="display:flex; align-items:center; gap:10px; cursor:pointer; font-size:0.85rem;">
                        <input type="checkbox" id="termsCheckbox" style="accent-color:#7C3AED; width:16px; height:16px;">
                        <span>I agree to the <a href="#" style="color:#7C3AED;">Terms of Service</a> and <a href="#" style="color:#7C3AED;">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="auth-btn" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-link">
                Already have an account? <a href="login.html">Sign In →</a>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/app.bundle.js"></script>
    <script>
        function togglePwd(fieldId, iconId) {
            const f = document.getElementById(fieldId);
            const i = document.getElementById(iconId);
            if (f.type === 'password') { f.type = 'text';     i.className = 'far fa-eye-slash'; }
            else                       { f.type = 'password'; i.className = 'far fa-eye'; }
        }

        // Backend health check
        (async function checkBackend() {
            const dot    = document.getElementById('statusDot');
            const text   = document.getElementById('statusText');
            const banner = document.getElementById('backendStatusBanner');
            try {
                const ctrl = new AbortController();
                setTimeout(() => ctrl.abort(), 5000);
                const res = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({}),
                    signal: ctrl.signal
                });
                dot.className = 'online';
                text.textContent = 'Backend online ✓';
                banner.style.display = 'none';
            } catch {
                dot.className = 'offline';
                text.textContent = 'Backend offline – start Spring Boot first';
                banner.style.display = 'flex';
            }
        })();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!document.getElementById('termsCheckbox').checked) {
                showToast('Please agree to the Terms of Service', 'error');
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.classList.add('btn-loading');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

            const ok = await Auth.register({
                fullName:        document.getElementById('fullName').value.trim(),
                email:           document.getElementById('email').value.trim(),
                phone:           document.getElementById('phone').value.trim(),
                password:        document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value
            });

            if (!ok) {
                btn.classList.remove('btn-loading');
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        });
    </script>
</body>
</html>
